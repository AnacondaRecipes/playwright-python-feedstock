{% set name = "playwright-python" %}
{% set version = "1.50.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/Microsoft/playwright-python/archive/v{{ version }}.tar.gz
  sha256: 6b9820cc2680902bd6140e05c47dffba234a252d2118d5d22512a2140a4d1905
  patches:
    - auditwheel.patch  # auditwheel is only available for linux, so we remove it from the build requirements
    - setup.patch       # Disable download of binaries 
    - driver.patch      # Fix playwright nodejs location

build:
  number: 0
  entry_points:
    - playwright=playwright.__main__:main
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: True  # [py<39]

requirements:
  host:
    - python
    - wheel >=0.45.1
    - setuptools >=75.6.0
    - setuptools-scm >=8.1.0
    - pip
  run:
    - python
    - greenlet >=3.1.1,<4.0.0
    - pyee >=12,<13
    - playwright

test:
  imports:
    - playwright
    - playwright.sync_api
    - playwright.async_api
  commands:
    - pip check
    - playwright install --help
    - playwright --help
    # Unable to run pytests. The conftest.py import pixelmatch library which is not in main or snowflake channel.
  requires:
    - pip

about:
  home: https://github.com/Microsoft/playwright-python
  summary: Python version of the Playwright testing and automation library.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
